name: Generate Contribution Animation

on:
  schedule:
    # 每天 UTC 00:00 自动运行
    - cron: "0 0 * * *"
  # 允许手动触发
  workflow_dispatch:

# 需要写入权限才能 push 生成的 SVG 回仓库
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Generate config
        run: |
          cat > config.yml <<'YML'
          github:
            username: ${{ github.repository_owner }}
            token: "${{ secrets.GH_TOKEN }}"
          image:
            path: ""
            blur_sigma: 1.2
          output:
            file: output.svg
            cell_size: 12
            cell_gap: 2
            transition_ms: 1500
            toggle_interval_ms: 5000
          YML

      - name: Generate SVG
        run: npx tsx src/index.ts

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output.svg
          git diff --staged --quiet || git commit -m "chore: update contribution animation [skip ci]"
          git push
