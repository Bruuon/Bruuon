# SuperProfile 配置文件
# 复制此文件为 config.yml，填入真实值
# config.yml 已被 .gitignore 忽略，不会提交到仓库

github:
  username: your-github-username   # 你的 GitHub 用户名
  token: ""                         # GitHub Personal Access Token (需要 user:read 权限)

image:
  path: ""                          # 自定义图片路径（留空则自动生成彩虹渐变 demo）

blur:
  enabled: true                     # 是否开启高斯模糊 (true=模糊, false=像素马赛克)
  sigma: 1.2                        # 模糊强度 (越大越模糊，推荐 1.0~2.0；仅 enabled=true 时生效)

output:
  file: output.svg                  # 生成的 SVG 文件名
  render_mode: "colorFill"          # 渲染模式: "colorFill" | "imageClip" | "scatter"
  cell_size: 12                     # 每个格子大小 (px)
  cell_gap: 2                       # 格子间距 (px)
  transition_ms: 1500               # 颜色过渡时间 (毫秒)
  toggle_interval_ms: 5000          # 贡献图/图片切换间隔 (毫秒)
